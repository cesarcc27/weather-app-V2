<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather PWA v2.0</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; }
        .glass-card {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 30px;
        }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div class="glass-card p-8 shadow-2xl max-w-md mx-auto w-full relative overflow-hidden">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-3xl font-bold">Hoy</h1>
                <p id="weather-desc" class="mt-4 text-lg opacity-90">Cargando...</p>
            </div>
            <p class="text-sm opacity-80" id="current-date"></p>
        </div>

        <div class="flex justify-between items-center py-10">
            <div id="icon-container">
                <div class="w-24 h-24 bg-white/20 rounded-full blur-xl absolute -left-4"></div>
                <img src="https://openweathermap.org/img/wn/04d@4x.png" alt="clima" class="w-32 relative z-10">
            </div>
            <div class="text-right">
                <div class="text-7xl font-light" id="temp-f">--°F</div>
                <div class="text-4xl font-light opacity-80 mt-2" id="temp-c">--°C</div>
            </div>
        </div>

        <p class="text-xs opacity-60 mt-4" id="last-updated">Actualizado: hace un momento</p>

        <div id="budget-section" class="hidden mt-6 pt-4 border-t border-white/20">
            <p class="text-xs uppercase tracking-widest mb-2">Every Dollar Mode</p>
            <div class="w-full bg-white/20 rounded-full h-4">
                <div class="bg-green-400 h-4 rounded-full" style="width: 75%"></div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto w-full mt-6 space-y-4">
        <div class="bg-gray-800 p-4 rounded-xl flex justify-between items-center">
            <span>Activar Every Dollar Mode</span>
            <input type="checkbox" id="toggle-budget" class="w-6 h-6">
        </div>
        
        <div class="bg-gray-800 p-4 rounded-xl">
            <h3 class="font-bold mb-2 text-sm">Opción 3: Pronóstico Extendido</h3>
            <div class="flex justify-between text-xs opacity-70">
                <span>Lun: 42°F</span><span>Mar: 45°F</span><span>Mie: 38°F</span>
            </div>
        </div>

        <div class="bg-gray-800 p-4 rounded-xl border-l-4 border-yellow-500">
            <h3 class="font-bold text-sm text-yellow-500">Opción 4: Alertas Activas</h3>
            <p class="text-xs">No hay alertas climáticas en tu zona.</p>
        </div>
    </div>

    <script>
        // Lógica de Fecha
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', { 
            month: 'long', day: 'numeric', year: 'numeric' 
        });

        // Simulación de datos (En un caso real usarías fetch a OpenWeather API)
        function updateWeather() {
            const f = 45;
            const c = Math.round((f - 32) * 5 / 9);
            document.getElementById('temp-f').innerText = `${f}°F`;
            document.getElementById('temp-c').innerText = `${c}°C`;
            document.getElementById('weather-desc').innerText = "Nubes Dispersas";
        }

        // Option 1 Logic
        document.getElementById('toggle-budget').addEventListener('change', (e) => {
            const section = document.getElementById('budget-section');
            section.classList.toggle('hidden', !e.target.checked);
        });

        updateWeather();

        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
