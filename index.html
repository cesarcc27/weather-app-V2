<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima PWA v2.0</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Color azul extraído del widget de la imagen */
        :root {
            --widget-blue: #5c4df2; 
        }
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }
        .widget-card {
            background-color: var(--widget-blue);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="p-6 flex flex-col items-center justify-start min-h-screen">

    <div class="widget-card p-10 w-full max-w-md aspect-[4/3] flex flex-col justify-between relative overflow-hidden">
        
        <div class="flex justify-between items-start z-10">
            <h1 class="text-4xl font-semibold tracking-tight">Today</h1>
            <p class="text-xl opacity-90" id="current-date">-- --, 2026</p>
        </div>

        <div class="flex justify-between items-end z-10">
            <div class="flex flex-col">
                <div class="relative w-32 h-32 mb-4">
                    <img src="https://openweathermap.org/img/wn/04d@4x.png" alt="clima" class="w-full drop-shadow-lg">
                </div>
                <p id="weather-desc" class="text-2xl font-medium">Broken Clouds</p>
            </div>

            <div class="text-right leading-none">
                <div class="text-[90px] font-medium" id="temp-f">45°F</div>
                <div class="text-[50px] font-light opacity-80 mt-2" id="temp-c">7°C</div>
            </div>
        </div>

        <div class="mt-4 z-10">
            <p class="text-sm opacity-60" id="last-updated">Last Updated: 3 minutes ago</p>
        </div>
    </div>

    <div class="w-full max-w-md mt-8 space-y-4">
        <div class="bg-white/5 backdrop-blur-md p-5 rounded-3xl border border-white/10">
            <h3 class="text-sm font-bold uppercase tracking-widest text-blue-400 mb-3">Pronóstico Semanal</h3>
            <div class="flex justify-between text-center">
                <div><p class="text-xs opacity-50">LUN</p><p class="font-bold">42°</p></div>
                <div><p class="text-xs opacity-50">MAR</p><p class="font-bold">45°</p></div>
                <div><p class="text-xs opacity-50">MIE</p><p class="font-bold">38°</p></div>
                <div><p class="text-xs opacity-50">JUE</p><p class="font-bold">40°</p></div>
                <div><p class="text-xs opacity-50">VIE</p><p class="font-bold">44°</p></div>
            </div>
        </div>

        <div class="bg-yellow-500/10 p-5 rounded-3xl border border-yellow-500/20 flex items-center gap-4">
            <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
            <p class="text-sm text-yellow-200/80">No se detectan alertas climáticas activas.</p>
        </div>
    </div>

    <script>
        // Fecha Automática
        const options = { month: 'long', day: 'numeric', year: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', options);

        // Registro de Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
